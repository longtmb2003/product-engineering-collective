<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Mạng lưới kết nối bằng nét đứt (Dotted Network Lines) -->
  <g stroke="#1c1b18" stroke-width="4" stroke-dasharray="0, 11" stroke-linecap="round">
    <line x1="50" y1="26" x2="26" y2="50" />
    <line x1="50" y1="26" x2="74" y2="50" />
    <line x1="26" y1="50" x2="50" y2="74" />
    <line x1="74" y1="50" x2="50" y2="74" />
    <line x1="26" y1="50" x2="74" y2="50" />
    <line x1="50" y1="26" x2="50" y2="74" />
  </g>

  <!-- Các khối hình học chính (Rất dày, nét bo tròn, không bóng đổ) -->
  <g stroke="#1c1b18" stroke-width="7" stroke-linejoin="round">
    <!-- Hình Tròn (Backend Dev) -->
    <circle cx="50" cy="26" r="14" fill="#cdb4db" />
    
    <!-- Hình Vuông (Tester) -->
    <rect x="12" y="36" width="28" height="28" rx="6" fill="#2d9f75" />
    
    <!-- Dấu Cộng (Marketing / Infra) -->
    <path d="M 68,44 L 68,36 L 80,36 L 80,44 L 88,44 L 88,56 L 80,56 L 80,64 L 68,64 L 68,56 L 60,56 L 60,44 Z" fill="#f4a261" />
    
    <!-- Hình Tam Giác Hướng Xuống (Growth / Vertex) -->
    <polygon points="32,60 68,60 50,88" fill="#e76f51" />
  </g>

  <!-- Các chấm lõi (Core Dots) hoàn hảo ở giữa mỗi khối -->
  <g fill="#1c1b18">
    <circle cx="50" cy="26" r="4" />
    <circle cx="26" cy="50" r="4" />
    <circle cx="74" cy="50" r="4" />
    <circle cx="50" cy="70" r="4" />
  </g>
</svg>
